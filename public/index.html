<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>人脸识别系统</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    .login-box h1 {
      text-align: center;
      margin: 0 0 10px;
      color: #111;
      font-size: 24px;
    }
    .login-box .subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .version-section {
      margin-bottom: 20px;
    }
    .version-section:last-child {
      margin-bottom: 0;
    }
    .version-btn {
      width: 100%;
      padding: 16px;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .version-btn.local {
      background: #10b981;
    }
    .version-btn.local:hover {
      background: #059669;
    }
    .version-btn.cloud {
      background: #4f8aff;
    }
    .version-btn.cloud:hover {
      background: #3b7cdd;
    }
    .divider {
      text-align: center;
      margin: 25px 0;
      color: #9ca3af;
      font-size: 13px;
      position: relative;
    }
    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #e5e7eb;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #374151;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #4f8aff;
    }
    .login-btn {
      width: 100%;
      margin-top: 8px;
    }
    .error-msg {
      color: #e53e3e;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
    .error-msg.show {
      display: block;
    }
    .feature-list {
      list-style: none;
      padding: 0;
      margin: 12px 0 0;
      font-size: 12px;
      color: #6b7280;
    }
    .feature-list li {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .feature-list li::before {
      content: '✓';
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1>人脸识别系统</h1>
      <p class="subtitle">请选择版本进入</p>
      
      <!-- 本地版入口 -->
      <div class="version-section">
        <button class="version-btn local" onclick="location.href='local.html'">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
          </svg>
          本地版本
        </button>
        <ul class="feature-list">
          <li>数据存储在浏览器本地</li>
          <li>无需联网即可使用</li>
          <li>隐私安全，不上传数据</li>
        </ul>
      </div>

      <div class="divider">或</div>

      <!-- 云端版入口 -->
      <div class="version-section">
        <button class="version-btn cloud" onclick="showCloudLogin()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
          </svg>
          云端服务版
        </button>
        
        <div id="cloudLoginSection" style="display:none; margin-top: 16px;">
          <form id="cloudLoginForm">
            <div class="form-group">
              <label for="username">账号</label>
              <input type="text" id="username" placeholder="请输入账号" required />
            </div>
            <div class="form-group">
              <label for="password">密码</label>
              <input type="password" id="password" placeholder="请输入密码" required />
            </div>
            <div class="error-msg" id="errorMsg">账号或密码错误</div>
            <button type="submit" class="login-btn version-btn cloud">登录</button>
          </form>
          <p style="font-size:12px;color:#6b7280;margin-top:12px;text-align:center;">
            默认账号: admin / admin123
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    const CLOUD_TOKEN_KEY = 'cloud_token';
    const CLOUD_USER_KEY = 'cloud_user';

    function showCloudLogin() {
      const section = document.getElementById('cloudLoginSection');
      section.style.display = section.style.display === 'none' ? 'block' : 'none';
    }

    document.getElementById('cloudLoginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = this.querySelector('button[type="submit"]');

      submitBtn.disabled = true;
      submitBtn.textContent = '登录中...';

      try {
        const res = await fetch(API_BASE + '/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem(CLOUD_TOKEN_KEY, data.token);
          localStorage.setItem(CLOUD_USER_KEY, JSON.stringify(data.user));
          location.href = 'cloud.html';
        } else {
          errorMsg.textContent = data.error || '登录失败';
          errorMsg.classList.add('show');
          setTimeout(() => errorMsg.classList.remove('show'), 3000);
        }
      } catch (err) {
        errorMsg.textContent = '网络错误，请稍后重试';
        errorMsg.classList.add('show');
        setTimeout(() => errorMsg.classList.remove('show'), 3000);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '登录';
      }
    });
  </script>
</body>
</html>
