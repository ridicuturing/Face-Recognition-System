<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>人脸识别 Demo（云端版）</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .header-bar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-bar h1 {
      margin: 0;
      font-size: 18px;
      color: #111;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-bar .cloud-icon {
      color: #4f8aff;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-info span {
      font-size: 14px;
      color: #6b7280;
    }
    .logout-btn {
      background: #6b7280;
      font-size: 13px;
      padding: 6px 12px;
    }
    .logout-btn:hover {
      background: #4b5563;
    }
    .back-btn {
      background: #4f8aff;
      font-size: 13px;
      padding: 6px 12px;
    }
    .back-btn:hover {
      background: #3b7cdd;
    }
    .sync-status {
      font-size: 12px;
      color: #6b7280;
      margin-left: 12px;
    }
    .sync-status.syncing {
      color: #4f8aff;
    }
    .sync-status.error {
      color: #e53e3e;
    }
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: #e5e7eb;
      z-index: 9999;
      display: none;
    }
    .progress-bar.active {
      display: block;
    }
    .progress-bar .progress {
      height: 100%;
      background: #4f8aff;
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div class="progress-bar" id="progressBar">
    <div class="progress" id="progress"></div>
  </div>
  
  <div class="header-bar">
    <h1>
      <svg class="cloud-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
      </svg>
      云端人脸识别
    </h1>
    <div class="user-info">
      <span id="welcomeMsg">欢迎</span>
      <span class="sync-status" id="syncStatus"></span>
      <button class="back-btn" id="backBtn">返回首页</button>
      <button class="logout-btn" id="logoutBtn">退出登录</button>
    </div>
  </div>

  <div class="container">
    <!-- 上传区 -->
    <section class="panel upload-panel">
      <h2>上传人脸并命名</h2>
      <div id="drop-area" class="drop-area">
        将图片拖放到此处，或点击选择图片
        <input id="fileInput" type="file" accept="image/*" />
      </div>
      <div class="form-row">
        <input id="nameInput" placeholder="输入名称（如：张三）" />
        <button id="addFaceBtn">保存脸部描述</button>
      </div>
      <div id="preview" class="preview"></div>
      <div id="uploadedList" class="list"></div>
    </section>

    <!-- 摄像头区（实时识别） -->
    <section class="panel cam-panel">
      <div class="video-wrap">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
      </div>
      <div class="controls" style="gap:8px; align-items:center; display:flex;">
        <button id="startBtn">开启摄像头</button>
        <button id="stopBtn" disabled>停止</button>
        <button id="fullscreenBtn" class="small-btn" title="全屏显示">全屏</button>
        <span id="status">尚未开启</span>
      </div>
    </section>
  </div>

  <script>
    const API_BASE = '';
    const CLOUD_TOKEN_KEY = 'cloud_token';
    const CLOUD_USER_KEY = 'cloud_user';

    function getToken() {
      return localStorage.getItem(CLOUD_TOKEN_KEY);
    }

    function getUser() {
      const stored = localStorage.getItem(CLOUD_USER_KEY);
      return stored ? JSON.parse(stored) : null;
    }

    function logout() {
      localStorage.removeItem(CLOUD_TOKEN_KEY);
      localStorage.removeItem(CLOUD_USER_KEY);
      location.href = 'index.html';
    }

    async function apiRequest(url, options = {}) {
      const token = getToken();
      const headers = {
        'Content-Type': 'application/json',
        ...options.headers
      };
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }

      const res = await fetch(API_BASE + url, {
        ...options,
        headers
      });

      if (res.status === 401 || res.status === 403) {
        logout();
        throw new Error('登录已过期');
      }

      return res;
    }

    const session = getUser();
    if (!session || !getToken()) {
      location.href = 'index.html';
    }

    document.getElementById('welcomeMsg').textContent = '欢迎，' + session.username;
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('backBtn').addEventListener('click', () => location.href = 'index.html');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.5/dist/face-api.min.js"></script>
  <script src="cloud-script.js"></script>
</body>
</html>
